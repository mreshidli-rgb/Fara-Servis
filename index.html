<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara Servis Arzuman | Peşəkar Optika Bərpası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #060913;
            --panel-bg: rgba(13, 19, 33, 0.75);
            --primary-orange: #ff5500;
            --cyber-cyan: #00ffff;
            --text-gray: #94a3b8;
            
            --n-blue: #00d2ff;
            --n-orange: #ff5500;
            --n-green: #00ff66;
            --n-red: #ff3333;
            --n-yellow: #ffcc00;
            --n-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark); 
            background: linear-gradient(rgba(6, 9, 19, 0.82), rgba(6, 9, 19, 0.92)), 
                        url('https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* HEADER */
        header { text-align: center; padding: 40px 20px 20px; }
        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2.8rem; color: var(--primary-orange);
            font-weight: 900; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255, 85, 0, 0.6);
        }
        .slogan {
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--cyber-cyan);
            margin-top: 5px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 10px 20px; }

        /* AXTARIŞ VƏ BAŞLIQ BÖLMƏSİ */
        .search-section { text-align: center; margin: 30px 0; }
        .search-section h2 { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; margin-bottom: 15px; font-weight: 700; }
        .search-wrapper { position: relative; max-width: 500px; margin: 0 auto; }
        .search-wrapper input {
            width: 100%; padding: 14px 20px 14px 45px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; color: #fff; font-size: 1rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .search-wrapper input:focus { outline: none; border-color: var(--cyber-cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 1.1rem; }

        /* AVTOMOBİL MARKALARI GRID (SƏNİN ORİJİNAL DİZAYNIN) */
        .brand-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 15px; 
            margin-bottom: 50px;
            background: rgba(10, 15, 30, 0.4); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px);
        }
        .brand-card {
            background: rgba(20, 27, 45, 0.85); border-radius: 12px; padding: 15px 10px;
            text-align: center; cursor: pointer; transition: all 0.25s ease; display: flex;
            flex-direction: column; align-items: center; justify-content: center; height: 105px;
        }
        .brand-card i.brand-icon { font-size: 2.2rem; margin-bottom: 8px; color: #e2e8f0; transition: transform 0.3s; }
        .brand-card h3 { font-size: 0.85rem; font-weight: 500; color: #cbd5e1; letter-spacing: 0.5px; }
        .brand-card:hover { transform: translateY(-5px) scale(1.03); background: rgba(26, 36, 59, 0.95); }
        .brand-card:hover i.brand-icon { transform: scale(1.1); }

        .br-blue { border: 2.5px solid var(--n-blue); } .br-blue:hover { box-shadow: 0 0 15px var(--n-blue); } .br-blue i { color: var(--n-blue) !important; }
        .br-orange { border: 2.5px solid var(--n-orange); } .br-orange:hover { box-shadow: 0 0 15px var(--n-orange); } .br-orange i { color: var(--n-orange) !important; }
        .br-green { border: 2.5px solid var(--n-green); } .br-green:hover { box-shadow: 0 0 15px var(--n-green); } .br-green i { color: var(--n-green) !important; }
        .br-red { border: 2.5px solid var(--n-red); } .br-red:hover { box-shadow: 0 0 15px var(--n-red); } .br-red i { color: var(--n-red) !important; }
        .br-yellow { border: 2.5px solid var(--n-yellow); } .br-yellow:hover { box-shadow: 0 0 15px var(--n-yellow); } .br-yellow i { color: var(--n-yellow) !important; }
        .br-white { border: 2.5px solid var(--n-white); } .br-white:hover { box-shadow: 0 0 15px var(--n-white); } .br-white i { color: var(--n-white) !important; }

        /* AŞAĞI PANEL DÜZÜLÜŞÜ */
        .bottom-widgets { display: grid; grid-template-columns: 1.3fr 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 900px) { .bottom-widgets { grid-template-columns: 1fr; } }
        .widget-card {
            background: var(--panel-bg); border-radius: 16px; padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .widget-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .slider-wrapper { position: relative; width: 100%; height: 280px; overflow: hidden; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); }
        .slider-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .img-before { z-index: 1; }
        .img-after { z-index: 2; width: 50%; border-right: 3px solid var(--primary-orange); }
        .slider-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: ew-resize; z-index: 3; }
        .slider-label { position: absolute; bottom: 12px; background: rgba(0,0,0,0.75); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }

        .rating-box { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .rating-box span { font-size: 0.95rem; color: #cbd5e1; }
        .stars { color: #ffbb00; font-size: 1.2rem; display: flex; gap: 4px; }

        .upload-container { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .upload-title-orange { font-family: 'Orbitron', sans-serif; color: #ffa500; font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; letter-spacing: 1px; }
        .upload-subtitle { font-size: 0.9rem; color: #fff; margin-bottom: 25px; text-transform: uppercase; }
        .circle-dropzone {
            width: 130px; height: 130px; border-radius: 50%; border: 2px dashed #ffa500; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; position: relative; background: rgba(0, 0, 0, 0.3);
            margin-bottom: 20px; box-shadow: inset 0 0 15px rgba(255, 165, 0, 0.1); transition: all 0.3s; overflow: hidden
