<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara Servis Arzuman | Premium Optika</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00e5ff;
            --dark-bg: #050914;
            --card-glass: rgba(10, 15, 30, 0.85);
            --text-light: #e2e8f0;
            --glow: 0 0 25px rgba(0, 229, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            /* Təzə arxa fon: Tünd Qaraj və Neon Effekt */
            background: linear-gradient(to bottom, rgba(5, 9, 20, 0.9), rgba(5, 9, 20, 0.95)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
            color: var(--text-light);
            min-height: 100vh;
        }

        /* YENİ HEADER DİZAYNI */
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: var(--glow);
        }

        header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--neon-blue);
            text-transform: uppercase;
        }

        header h1 span { color: var(--neon-blue); }

        .slogan {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 15px;
            letter-spacing: 3px;
        }

        .contact-bar {
            display: flex; justify-content: center; gap: 50px; 
            padding: 20px; background: rgba(0, 229, 255, 0.05);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2); flex-wrap: wrap;
        }
        .contact-item { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .contact-item i { color: var(--neon-blue); font-size: 1.5rem; }
        .contact-item a { color: #fff; text-decoration: none; transition: 0.3s; }
        .contact-item a:hover { color: var(--neon-blue); text-shadow: var(--glow); }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }

        .page { display: none; opacity: 0; transform: scale(0.95); transition: all 0.5s ease; }
        .page.active { display: block; opacity: 1; transform: scale(1); }

        /* YENİ MARKALAR QREDİ - DAİRƏVİ ŞƏKİLLƏR */
        .brand-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            margin-top: 40px; 
        }
        .brand-card {
            background: var(--card-glass); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer; 
            backdrop-filter: blur(15px); transition: 0.4s ease;
        }
        .brand-card:hover { 
            border-color: var(--neon-blue); transform: translateY(-10px); 
            box-shadow: var(--glow); background: rgba(0, 229, 255, 0.1); 
        }
        /* Şəkillər tamamilə dairəvi edildi və rənglidir */
        .brand-card img { 
            width: 120px; height: 120px; object-fit: cover; 
            border-radius: 50%; margin-bottom: 15px; 
            border: 3px solid transparent; transition: 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .brand-card:hover img { border-color: var(--neon-blue); transform: rotate(5deg) scale(1.1); }
        .brand-card h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 1px;}

        /* XİDMƏTLƏR */
        .choice-container { display: flex; justify-content: center; gap: 40px; margin-top: 50px; flex-wrap: wrap; }
        .choice-card {
            background: var(--card-glass); border: 2px solid transparent; width: 350px; padding: 50px 30px;
            border-radius: 25px; text-align: center; cursor: pointer; transition: 0.4s;
        }
        .choice-card:hover { border-color: var(--neon-blue); transform: translateY(-10px); box-shadow: var(--glow); }
        .choice-card i { font-size: 4.5rem; color: var(--neon-blue); margin-bottom: 25px; }

        /* QALEREYA */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 35px; margin-top: 40px; }
        .gallery-item {
            background: rgba(10, 15, 30, 0.9); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
        }
        .gallery-item:hover { transform: scale(1.02); box-shadow: var(--glow); border-color: var(--neon-blue); }
        .gallery-images { display: flex; height: 250px; }
        .gallery-images img { width: 50%; height: 100%; object-fit: cover; }
        .img-label {
            position: absolute; bottom: 15px; left: 15px; background: #000;
            padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; color: #fff;
        }
        .gallery-info { padding: 25px; text-align: center; }
        .gallery-info h4 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; color: #fff; margin-bottom: 10px; }
        .gallery-info p { font-size: 0.95rem; color: var(--text-light); }

        .btn-back {
            background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); 
            padding: 12px 35px; border-radius: 50px; cursor: pointer; font-size: 1rem; 
            font-weight: 600; transition: 0.3s;
        }
        .btn-back:hover { background: var(--neon-blue); color: #000; box-shadow: var(--glow); }

        .whatsapp-float {
            position: fixed; bottom: 40px; right: 40px; background: #25d366; color: white;
            width: 75px; height: 75px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 45px; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.5); z-index: 100; text-decoration: none; transition: 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.15); }
    </style>
</head>
<body>

    <header>
        <h1><span>Fara Servis</span> Arzuman</h1>
        <div class="slogan">QARANLIĞI AYDINLAT, YOLLARA MÖHÜRÜNÜ VUR!</div>
    </header>

    <div class="contact-bar">
        <div class="contact-item"><i class="fa-solid fa-map-location-dot"></i> <span>Sumqayıt şəhəri, Avto Servis</span></div>
        <div class="contact-item"><i class="fa-brands fa-whatsapp"></i> <a href="tel:+994556057891">055 605 78 91</a></div>
    </div>

    <div class="container">
