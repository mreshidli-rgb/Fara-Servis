<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara Servis Arzuman | Premium Optika Mərkəzi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(12, 14, 20, 0.9), rgba(12, 14, 20, 0.95)), 
                        url('https://images.unsplash.com/photo-1542282088-fe8426682b8f?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 45px 20px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 85, 0, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { font-size: 2.2rem; color: #ff5500; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .slogan { font-size: 1.1rem; color: #38bdf8; margin-top: 10px; font-weight: 500; font-style: italic; letter-spacing: 0.5px; }

        .contact-bar {
            display: flex; justify-content: center; gap: 40px; background: rgba(15, 23, 42, 0.9);
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; font-size: 0.95rem;
        }
        .contact-item { display: flex; align-items: center; gap: 10px; color: #cbd5e1; }
        .contact-item i { color: #ff5500; font-size: 1.2rem; }
        .contact-item a { color: #fff; text-decoration: none; font-weight: 600; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .page { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease-in-out; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* Rəsmi Loqolar Üçün Grid */
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 30px; }
        .brand-card {
            background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .brand-card:hover { border-color: #ff5500; transform: translateY(-5px); background: rgba(30, 41, 59, 0.9); box-shadow: 0 8px 20px rgba(255, 85, 0, 0.2); }
        .brand-card img { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.1)); }
        .brand-card h3 { margin-top: 12px; font-size: 0.85rem; font-weight: 500; color: #fff; }

        .choice-container { display: flex; justify-content: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .choice-card {
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); width: 280px; padding: 40px 20px;
            border-radius: 16px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .choice-card:hover { border-color: #38bdf8; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.15); }
        .choice-card i { font-size: 3.5rem; color: #38bdf8; margin-bottom: 20px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .gallery-item { background: rgba(30, 41, 59, 0.7); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.02); border-color: #ff5500; }
        .gallery-images { display: flex; width: 100%; height: 200px; }
        .gallery-images img { width: 50%; height: 100%; object-fit: cover; }
        .gallery-images .before { border-right: 2px solid #ff5500; position: relative; }
        .img-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .gallery-info { padding: 15px; text-align: center; }
        .gallery-info h4 { font-size: 1rem; color: #38bdf8; margin-bottom: 5px; }
        .gallery-info p { font-size: 0.85rem; color: #94a3b8; }

        .btn-back { background: #1e293b; color: #fff; border: 1px solid #334155; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s; }
        .btn-back:hover { background: #ff5500; border-color: #ff5500; }

        .features-box { background: rgba(15, 23, 42, 0.8); padding: 40px; border-radius: 16px; margin-top: 60px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .features-grid { display: flex; justify-content: center; gap: 40px; margin-top: 25px; flex-wrap: wrap; }
        .feature { max-width: 250px; }
        .feature i { font-size: 2.5rem; color: #ff5500; margin-bottom: 15px; }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 35px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 100; text-decoration: none; transition: transform 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1) rotate(10deg); }
    </style>
</head>
<body>

        <div class="slogan">"Qaranlığı Aydınlat, Yollara Möhürünü Vur!"</div>
    </header>

    <div class="contact-bar">
        <div class="contact-item"><i class="fa-solid fa-location-dot"></i> <span>Sumqayıt şəhəri, Avto Servis Zonası</span></div>
        <div class="contact-item"><i class="fa-solid fa-phone"></i> <a href="tel:+994556057891">055 605 78 91</a></div>
    </div>

    <div class="container">

                <div class="brand-card" onclick="selectBrand('Opel')
