<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara Servis Arzuman | Peşəkar Optika Bərpası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #060913;
            --panel-bg: rgba(13, 19, 33, 0.75);
            --primary-orange: #ff5500;
            --cyber-cyan: #00ffff;
            --text-gray: #94a3b8;
            
            /* Neon Rənglər */
            --n-blue: #00d2ff;
            --n-orange: #ff5500;
            --n-green: #00ff66;
            --n-red: #ff3333;
            --n-yellow: #ffcc00;
            --n-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(rgba(6, 9, 19, 0.85), rgba(6, 9, 19, 0.95)), 
                        url('https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            color: var(--primary-orange);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 85, 0, 0.6);
        }
        .slogan {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--cyber-cyan);
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 10px 20px; }

        /* AXTARIŞ PANELİ */
        .search-section { text-align: center; margin: 30px 0; }
        .search-section h2 { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; margin-bottom: 15px; }
        .search-wrapper { position: relative; max-width: 500px; margin: 0 auto; }
        .search-wrapper input {
            width: 100%; padding: 14px 20px 14px 45px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; color: #fff; font-size: 1rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .search-wrapper input:focus { outline: none; border-color: var(--cyber-cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }

        /* NEON GRID SİSTEMİ */
        .brand-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-bottom: 40px;
            background: rgba(10, 15, 30, 0.4); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px);
        }
        .brand-card {
            background: rgba(20, 27, 45, 0.85); border-radius: 12px; padding: 15px 10px; text-align: center;
            cursor: pointer; transition: all 0.25s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 105px;
        }
        .brand-card i.brand-icon { font-size: 2.2rem; margin-bottom: 8px; color: #e2e8f0; transition: transform 0.3s; }
        .brand-card h3 { font-size: 0.85rem; font-weight: 500; color: #cbd5e1; }
        .brand-card:hover { transform: translateY(-5px) scale(1.03); background: rgba(26, 36, 59, 0.95); }
        .brand-card:hover i.brand-icon { transform: scale(1.1); }

        /* NEON RƏNGLƏRİ */
        .br-blue { border: 2.5px solid var(--n-blue); } .br-blue:hover { box-shadow: 0 0 15px var(--n-blue); } .br-blue i { color: var(--n-blue) !important; }
