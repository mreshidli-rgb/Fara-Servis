<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fara Servis Arzuman | Peşəkar Optika Bərpası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0e1116;
            --card-bg: rgba(20, 24, 33, 0.75);
            --primary-orange: #ff5500;
            --text-gray: #94a3b8;
            --shadow-neon: 0 0 20px rgba(255, 85, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            /* YENİ: Premium Avtomobil Arxa Fonu */
            background: linear-gradient(rgba(10, 14, 23, 0.85), rgba(10, 14, 23, 0.95)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER & SLOGAN */
        header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(255, 85, 0, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--primary-orange);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 77, 5, 0.6);
        }

        .slogan {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00ffff;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* ƏLAQƏ PANELİ */
        .contact-bar {
            display: flex; justify-content: center; gap: 40px; background: rgba(15, 23, 42, 0.8);
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; font-size: 1rem;
        }
        .contact-item { display: flex; align-items: center; gap: 10px; color: #cbd5e1; }
        .contact-item i { color: var(--primary-orange); font-size: 1.2rem; }
        .contact-item a { color: #fff; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .contact-item a:hover { color: var(--primary-orange); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* PAGE TRANSITIONS */
        .page { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s ease-in-out; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* AVTOMOBİL MARKALARI GRID */
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .brand-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .brand-card:hover { border-color: var(--primary-orange); transform: translateY(-8px) scale(1.03); box-shadow: var(--shadow-neon); background: rgba(20, 24, 33, 0.95); }
        .brand-card img { 
            width: 100%; height: 110px; object-fit: cover; margin-bottom: 15px; border-radius: 10px; 
            filter: grayscale(80%) brightness(0.9); transition: all 0.4s ease; 
        }
        .brand-card:hover img { filter: grayscale(0%) brightness(1.2); transform: scale(1.05); }
        .brand-card h3 { font-size: 1.1rem; font-weight: 600; color: #fff; }

        /* XİDMƏT SEÇİMİ KARTLARI */
        .choice-container { display: flex; justify-content: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .choice-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); width: 320px; padding: 45px 30px;
            border-radius: 20px; text-align: center; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .choice-card:hover { border-color: #00ffff; transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0, 255, 255, 0.2); }
        .choice-card i { font-size: 4rem; color: #00ffff; margin-bottom: 25px; }

        /* YENİ QALEREYA SİSTEMİ */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-top: 35px; }
        .gallery-item {
            background: rgba(30, 41, 59, 0.85); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; backdrop-filter: blur(10px);
        }
        .gallery-item:hover { transform: scale(1.03); border-color: var(--primary-orange); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .gallery-images { display: flex; width: 100%; height: 230px; }
        .gallery-images img { width: 50%; height: 100%; object-fit: cover; }
        .gallery-images .before { border-right: 2px solid var(--primary-orange); position: relative; }
        .img-label {
            position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.8);
            padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; color: #fff; text-transform: uppercase;
        }
        .gallery-info { padding: 20px; text-align: center; }
        .gallery-info h4 { font-size: 1.1rem; color: #00ffff; margin-bottom: 8px; }
        .gallery-info p { font-size: 0.9rem; color: var(--text-gray); }

        .btn-back {
            background: #1e293b; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 12px 30px;
            border-radius: 40px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s; font-family: 'Orbitron', sans-serif;
        }
        .btn-back:hover { background: var(--primary-orange); border-color: var(--primary-orange); box-shadow: var(--shadow-neon); }

        /* WhatsApp Pro Düyməsi */

            position: fixed; bottom: 35px; right: 35px; background: #25d366; color: white;
